<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  
  <!-- تحويل فوري بدون انتظار -->
  <meta http-equiv="refresh" content="0; url=https://www.chuffed.org/project/150349-urgent-aid-for-the-survival-of-the-al-saidi-family-from-gaza" />
  
  <!-- JavaScript Redirect فوري -->
  <script type="text/javascript">
    window.location.replace("https://www.chuffed.org/project/150349-urgent-aid-for-the-survival-of-the-al-saidi-family-from-gaza");
  </script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🇵🇸</title>

  <!-- Social media preview -->
  <meta property="og:title" content="Urgent humanitarian appeal - Gaza" />
  <meta property="og:description" content="Palestinian flag" />
  <meta property="og:image" content="https://i.ibb.co/6cFthCry/xw-LMy-Li-Tg-GMq-Tfw7-K8-Xg.jpg" />
  <meta property="og:url" content="https://gofund.me/031e01e51" />
  <meta name="twitter:card" content="summary_large_image" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a1a;
      overflow: hidden;
    }
    
    /* علم فلسطين - SVG مع تأثير رفرف */
    .flag-container {
      width: 120px;
      height: 60px;
      animation: wave 0.8s ease-in-out infinite;
      transform-origin: left center;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
    }
    
    @keyframes wave {
      0%, 100% { transform: rotate(-3deg) scaleY(1); }
      50% { transform: rotate(3deg) scaleY(1.05); }
    }
    
    /* ألوان العلم الفلسطيني */
    .palestine-flag {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .palestine-flag .black { background: #000; height: 33.33%; position: absolute; width: 100%; top: 0; }
    .palestine-flag .white { background: #fff; height: 33.33%; position: absolute; width: 100%; top: 33.33%; }
    .palestine-flag .green { background: #007a3d; height: 33.33%; position: absolute; width: 100%; top: 66.66%; }
    .palestine-flag .triangle {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-top: 30px solid transparent;
      border-bottom: 30px solid transparent;
      border-right: 52px solid #ce1126;
    }
    
    /* وميض خفيف للعلم */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    .flag-container {
      animation: wave 0.8s ease-in-out infinite, pulse 2s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <!-- علم فلسطين يرفرف -->
  <div class="flag-container">
    <div class="palestine-flag">
      <div class="black"></div>
      <div class="white"></div>
      <div class="green"></div>
      <div class="triangle"></div>
    </div>
  </div>
  
  <!-- رابط احتياطي غير مرئي تقريباً -->
  <a href="https://www.chuffed.org/project/150349-urgent-aid-for-the-survival-of-the-al-saidi-family-from-gaza" style="position:absolute; bottom:5px; right:5px; font-size:10px; color:#444; text-decoration:none;">chuffed.org</a>
</body>
</html>
