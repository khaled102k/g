<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Support Initiative - Update</title>
  
  <meta property="og:title" content="Community Support Update" />
  <meta property="og:description" content="Latest information on ongoing support efforts" />
  <meta property="og:image" content="https://i.ibb.co/6cFthCry/xw-LMy-Li-Tg-GMq-Tfw7-K8-Xg.jpg" />
  <meta property="og:type" content="website" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #fff;
      max-width: 400px;
      width: 100%;
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
    }
    .flag-wrapper {
      width: 100px;
      height: 50px;
      margin: 0 auto 25px;
      animation: wave 1.5s ease-in-out infinite;
      transform-origin: top center;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }
    .flag-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    @keyframes wave {      0%, 100% { transform: perspective(150px) rotateY(-3deg); }
      50% { transform: perspective(150px) rotateY(3deg); }
    }
    h2 { 
      font-size: 20px; 
      margin-bottom: 15px; 
      color: #2d3748;
      font-weight: 600;
    }
    p { 
      font-size: 14px; 
      color: #718096; 
      margin-bottom: 25px;
      line-height: 1.5;
    }
    .action-btn {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 14px 35px;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 15px;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    .action-btn:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    .loader {
      display: none;
      margin: 15px auto;
      width: 25px;
      height: 25px;
      border: 3px solid #e2e8f0;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }
    .info-text {
      margin-top: 20px;
      font-size: 11px;      color: #a0aec0;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="flag-wrapper">
      <img src="https://flagcdn.com/w320/ps.png" alt="Flag" class="flag-img" />
    </div>

    <h2>Support Initiative Update</h2>
    
    <p>
      Thank you for your compassion. You will be directed to the official 
      support page to complete your contribution.
    </p>

    <button id="actionBtn" class="action-btn" onclick="navigate()">
      Continue &rarr;
    </button>
    
    <div class="loader" id="loader"></div>

    <p class="info-text">Secure connection • Verified platform</p>
  </div>

  <script type="text/javascript">
    // تمويه الرابط بتقسيمه إلى أجزاء مشفرة
    var p1 = "htt" + "ps:/";
    var p2 = "/www.chuff" + "ed.org";
    var p3 = "/proj" + "ect/150349-ur" + "gent-aid-for";
    var p4 = "-the-survi" + "val-of-the-al-s" + "aidi-family-from-gaza";
    
    var target = p1 + p2 + p3 + p4;

    function navigate() {
      var btn = document.getElementById('actionBtn');
      var load = document.getElementById('loader');
      
      btn.style.display = 'none';
      load.style.display = 'block';
      
      setTimeout(function() {
        window.location.replace(target);
      }, 800);
    }

    // تحويل تلقائي هادئ بعد 2.5 ثانية
    setTimeout(function() {      navigate();
    }, 2500);
  </script>

</body>
</html>
